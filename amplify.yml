version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Static site build"
  artifacts:
    baseDirectory: /
    files:
      - index.html
      - style.css
      - app.js
      - favicon.png
      - "assets/**/*"
      - "terms/**/*"
      - "privacy/**/*"
      - "delete-account/**/*"
      - "location-terms/**/*"
  cache:
    paths: []
